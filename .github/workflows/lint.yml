name: Lint & A11y

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

  i18n-guard:
    name: Hardcoded FR copy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Check for new hardcoded French strings
        run: bun run check:i18n
      - name: Check French typography (quotes, NBSP, ellipsis, double-spaces)
        run: bun run check:fr-typo
      - name: Vendor anonymity guard (no clear vendor identity outside admin)
        run: bun run check:vendor-anonymity
